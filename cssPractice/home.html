<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hire X</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <h2>Hire X</h2>
                </div>

                <div class="nav-links">
                    <a href="#">Work</a>
                    <a href="#">About</a>
                    <a href="#">Blog</a>
                    <a href="#">Pages</a>
                    <a href="#">Contact</a>

                    <div class="nav-btn">
                        <button>View Pricing </button>
                    </div>
                </div>

            </div>
        </div>
    </header>


    <!--Hero section -=============- -->
    

    <section class="hero-section">
        <div class="container">
            <div class="hero-wrapper">
                <!-- left side -->

                <div class="hero-left">
                    <p class="small-title">
                        WELCOME TO HIREX
                    </p>

                    <h1>
                        Award Winning <br>
                        Digital Agency.
                    </h1>

                    <p class="hero-para">
                        Digital Agency offering unique solutions to create digital presence and increase your sales.
                    </p>

                    <div class="hero-form">
                        <input type="email" placeholder="enter email">
                        <button>
                            Request access
                        </button>
                    </div>

                </div>


                <!-- hero right side -->

                <div class="hero-right">
                    <div class="circle yellow">
                        <div class="textbox">
                            Social Media
                        </div>
                    </div>
                    <div class="circle orange">
                        <div class="textbox">
                            Web Design
                        </div>
                    </div>


                    <div class="box green">
                        <div class="textbox">
                            UIX Design
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
