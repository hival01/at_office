<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>signal</title>
    <link rel="stylesheet" href="signal.css" />
  </head>
  <body>
    <div  class="time-container"></div>Timer : <span id="timer"></span></div>
    <div id="table-container">
      <table id="table">
        <!-- 1st row -->
        <tr>
          <td> &nbsp;</td>

          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td class="left-border"></td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>

        <!-- 2nd row -->

        <tr>
          <td>&nbsp;</td>

          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td class="left-border"></td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
        </tr>

        <!-- 3rd row -->
        <tr>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td class="right-border bottom"></td>
          <td class="signal-yellow c1">yellow</td>
          <td class="signal-red c2">red</td>
          <td class="signal-green c3">green</td>
          <td class="left-border"></td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
        </tr>

        <!-- 4th row -->
        <tr>
          <td class="top"></td>
          <td class="top"></td>
          <td class="signal-green c4">green</td>

          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td class="top signal-yellow c12">yellow</td>
          <td class="top"></td>
          <td class="top"></td>
        </tr>

        <!-- 5th row -->

        <tr>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td class="signal-red c5">&nbsp;red</td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td class="signal-red c11">&nbsp;red</td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
        </tr>

        <!-- 6th row -->

        <tr>
          <td class="bottom"></td>
          <td class="bottom"></td>
          <td class="bottom signal-yellow c6">yellow</td>

          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td class="bottom signal-green c10" >green</td>
          <td class="bottom"></td>
          <td class="bottom"></td>
        </tr>

        <!-- 7th rows -->
         <tr>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td class="right-border"></td>
          <td class="signal-green c7">green</td>
          <td class="signal-red c8">red</td>
          <td class="signal-yellow c9">yellow</td>
          <td class="left-border"></td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
        </tr>

        <!-- 2nd row -->

        <tr>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td class="right-border"></td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td class="left-border"></td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
        </tr>

        <!-- 3rd row -->
        <tr>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td class="right-border"></td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td>&nbsp;</td>
          <td class="left-border"></td>
          <td>&nbsp;</td> 
          <td>&nbsp;</td>
        </tr>
      </table>
      <button onclick="start()"> Start Signal</button>
    </div>
    
    <script src="signal.js"></script>
